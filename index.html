<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZONE+</title>


  <!-- Font Awesome 6 (brand icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="styles.css?v=5">
</head>

<body id="body">

  <!-- ── Flash overlay ─────────────────────────────────────── -->
  <div id="flash"></div>

  <!-- ── Grain ─────────────────────────────────────────────── -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════════════════
       §1  HERO
  ═══════════════════════════════════════════════════════════ -->
  <section id="hero">

    <video id="hero-video" autoplay muted playsinline webkit-playsinline loop preload="auto">
      <source src="hero.mp4" type="video/mp4">
    </video>

    <!-- top-left wordmark -->
    <div class="wordmark" aria-label="Zone+">
      ZONE<span>+</span>
    </div>

    <!-- right-side content (doesn't cover the walking character) -->
    <div class="hero-right">
      <p class="hero-tag">ARTIST · PRODUCER</p>

      <h1 class="hero-title">
        <span data-line="0">Music</span>
        <span data-line="1" class="hero-italic">outlives</span>
        <span data-line="2">everything.</span>
      </h1>
      <p class="hero-sub">Every session, every mix, every decision — made to last.</p>

    </div>

    <!-- bottom-left scroll cue -->
    <div class="scroll-cue" aria-hidden="true">
      <div class="scroll-cue-line"></div>
      <span>SCROLL</span>
    </div>

  </section>

  <!-- ═══════════════════════════════════════════════════════
       §2  FOOTER
  ═══════════════════════════════════════════════════════════ -->
  <footer id="footer">

    <!-- §2 Studio section — full bleed, no containers -->
    <div class="studio-section">

      <!-- Left: SoundCloud widget -->
      <div class="studio-left">
        <div class="studio-label">
          <span class="studio-rule"></span>
          <span>STREAM · ZONE+</span>
        </div>
        <div class="sc-outer">
          <div class="sc-live-label">
            <span class="live-dot"></span>
            NOW STREAMING
          </div>
          <div class="sc-shell">
            <iframe
              scrolling="no"
              frameborder="no"
              allow="autoplay"
              src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/zone-plus/sets/media-player&color=%232edcb4&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true">
            </iframe>
          </div>
        </div>
      </div>

      <!-- Right: video bleeds to viewport edge -->
      <div class="studio-video-col">
        <video class="studio-vid" autoplay muted loop playsinline preload="auto">
          <source src="Leg Tapping .mp4" type="video/mp4">
        </video>
      </div>

    </div>


  </footer>


  <!-- ═══════════════════════════════════════════════════════
       §3  SCROLL-SCRUB VIDEO
  ═══════════════════════════════════════════════════════════ -->
  <div id="scroll-section">

    <!-- progress label -->
    <div class="scrub-progress" id="scrub-progress">
      <span id="progress-pct">0</span><span class="pct-sym">%</span>
      <span class="pct-label">INTO THE ZONE</span>
    </div>

    <!-- scroll-to-discover hint -->
    <div class="discover-hint" id="discover-hint">
      <div class="discover-lines">
        <span></span><span></span><span></span>
      </div>
      <p>SCROLL TO DISCOVER</p>
    </div>

    <!-- sticky container -->
    <div id="sticky">

      <!-- side scroll nudge -->
      <div class="side-scroll" id="side-scroll" aria-hidden="true">
        <div class="side-scroll-line"></div>
        <div class="side-scroll-label">
          SCROLL<i class="fa-solid fa-chevron-down"></i>
        </div>
      </div>

      <!-- video inside its natural aspect-ratio box -->
      <div class="video-frame">

        <video id="scrub-video" preload="none" muted playsinline>
          <source src="scrub.mp4" type="video/mp4">
        </video>

        <!-- SVG lines — endpoints set by JS from actual DOM positions, no viewBox -->
        <svg class="link-lines" id="link-lines" aria-hidden="true"></svg>

        <!-- Invisible chest anchor — positioned at character's chest/stomach in the video.
             Lines radiate FROM this point. Adjust left/top to tune alignment. -->
        <div id="chest-anchor" style="
          position: absolute;
          left: 48%;
          top:  41%;
          width: 0; height: 0;
          pointer-events: none;
        "></div>

        <!-- Platform icons  ·  positions: LEFT col 10/7/10%, RIGHT col 68/72/68% -->
        <a href="https://open.spotify.com/artist/5TyGDxSguO86fVeA8LWQj1" class="link-icon" id="li-spotify"
           style="--ix:10%;--iy:10%"
           target="_blank" rel="noopener" aria-label="Spotify" data-order="0">
          <div class="icon-ring"><i class="fa-brands fa-spotify"></i></div>
          <span>Spotify</span>
        </a>

        <a href="https://share.google/YCrkApa1Of789kc6C" class="link-icon" id="li-apple"
           style="--ix:6%;--iy:40%"
           target="_blank" rel="noopener" aria-label="Apple Music" data-order="1">
          <div class="icon-ring"><i class="fa-brands fa-apple"></i></div>
          <span>Apple Music</span>
        </a>

        <a href="https://zoneplus.bandcamp.com/music" class="link-icon" id="li-bandcamp"
           style="--ix:10%;--iy:74%"
           target="_blank" rel="noopener" aria-label="Bandcamp" data-order="2">
          <div class="icon-ring"><i class="fa-brands fa-bandcamp"></i></div>
          <span>Bandcamp</span>
        </a>

        <a href="https://soundcloud.com/zone-plus" class="link-icon" id="li-soundcloud"
           style="--ix:68%;--iy:10%"
           target="_blank" rel="noopener" aria-label="SoundCloud" data-order="3">
          <div class="icon-ring"><i class="fa-brands fa-soundcloud"></i></div>
          <span>SoundCloud</span>
        </a>

        <a href="https://www.instagram.com/z0neplus/" class="link-icon" id="li-instagram"
           style="--ix:72%;--iy:40%"
           target="_blank" rel="noopener" aria-label="Instagram" data-order="4">
          <div class="icon-ring"><i class="fa-brands fa-instagram"></i></div>
          <span>Instagram</span>
        </a>

        <a href="https://www.beatport.com/artist/zone-plus/558090" class="link-icon" id="li-beatport"
           style="--ix:68%;--iy:74%"
           target="_blank" rel="noopener" aria-label="Beatport" data-order="5">
          <div class="icon-ring">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" aria-hidden="true">
              <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 3.6c4.635 0 8.4 3.765 8.4 8.4s-3.765 8.4-8.4 8.4S3.6 16.635 3.6 12 7.365 3.6 12 3.6zM9.6 6.6v10.8h2.55v-4.05l2.1 4.05h2.85l-2.55-4.35c.825-.33 1.41-1.14 1.41-2.1 0-1.245-.99-2.25-2.25-2.25H9.6z"/>
            </svg>
          </div>
          <span>Beatport</span>
        </a>

      </div><!-- /video-frame -->
    </div><!-- /sticky -->
  </div><!-- /scroll-section -->

  <script src="script.js?v=4"></script>
</body>
</html>
